# DigitalOcean App Platform spec
# Deploy: doctl apps create --spec app.yaml
# Update: doctl apps update <app-id> --spec app.yaml

name: shadow-llm-proxy
region: nyc

services:
  - name: api
    dockerfile_path: Dockerfile
    source_dir: /
    github:
      repo: YOUR_GITHUB_USER/shadow-llm-proxy
      branch: main
      deploy_on_push: true

    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs

    health_check:
      http_path: /actuator/health
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

    envs:
      - key: PORT
        value: "8080"
        scope: RUN_TIME
      - key: LLM_SHADOW_ENABLED
        value: "true"
        scope: RUN_TIME

    routes:
      - path: /
